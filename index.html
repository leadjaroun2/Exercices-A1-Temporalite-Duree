<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Durée & Temporalité A1 - Français</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700&family=Playfair+Display:wght=700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003057; /* Bleu Marine Management */
            --accent: #00A9CE; /* Bleu Azur */
            --success: #27AE60;
            --error: #E74C3C;
            --bg: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #E2E8F0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-card {
            background: white;
            width: 95%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 40px;
        }

        /* Barre de progression */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-container {
            flex-grow: 1;
            height: 8px;
            background: #EDF2F7;
            border-radius: 4px;
            margin: 0 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Zone Question */
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 28px;
            margin: 0 0 20px 0;
        }

        .question-box {
            background: var(--bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 10px;
        }

        .translation-link {
            color: var(--accent);
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            font-style: italic;
        }

        /* Boutons */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid #E2E8F0;
            padding: 18px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #F0F9FF;
        }

        .option-btn.correct {
            background-color: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }

        .option-btn.incorrect {
            background-color: #FEE2E2;
            border-color: var(--error);
            color: #991B1B;
        }

        /* Feedback */
        .feedback {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            display: none;
        }

        .next-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        .next-btn:hover {
            background: #002340;
        }

        /* Ecran Final */
        #result-screen {
            text-align: center;
            display: none;
        }
        
        .score-big {
            font-size: 64px;
            color: var(--primary);
            font-weight: 800;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="quiz-ui">
        <div class="header">
            <span id="q-count" style="font-weight: 600; color: #64748B;">Question 1/20</span>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
            <span id="score-count" style="font-weight: 600; color: var(--primary);">Score: 0</span>
        </div>

        <h1>Durée &amp; Temporalité</h1>
        
        <div class="question-box">
            <div class="question-text" id="q-text">Chargement...</div>
            <div class="translation-link" id="t-link" onclick="toggleTranslation()">👁️ Traduire en anglais / Translate to English</div>
        </div>

        <div class="options-grid" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
    </div>

    <div id="result-screen">
        <h1 id="res-title">Quiz Terminé !</h1>
        <div class="score-big" id="final-score">0 / 20</div>
        <p id="res-comment" style="font-size: 18px; margin-bottom: 30px;"></p>
        <button class="next-btn" style="display:block;" onclick="location.reload()">Recommencer / Restart</button>
    </div>
</div>

<script>
    const questions = [
        // 1. Action immédiate
        { q: "Je bois un thé de l'après-midi ________.", t: "I am drinking an afternoon tea now.", o: ["à midi", "pendant", "maintenant", "de"], a: 2 },
        { q: "Je quitte le bureau ________ pour prendre mon train.", t: "I am leaving the office right away to catch my train.", o: ["tout de suite", "pendant", "à", "de"], a: 0 },
        { q: "Nous répondons au courriel important ________.", t: "We are answering the important email now.", o: ["pendant", "maintenant", "à deux heures", "de"], a: 1 },
        { q: "Il téléphone à son responsable ________.", t: "He is calling his manager right away.", o: ["pendant", "à", "de", "tout de suite"], a: 3 },
        { q: "________, je prépare activement la réunion.", t: "Now, I am actively preparing the meeting.", o: ["Pendant", "À", "Maintenant", "De"], a: 2 },
        
        // 2. Préciser une heure fixe
        { q: "Je prends ma douche ________ six heures du matin.", t: "I take my shower at six o'clock in the morning.", o: ["pendant", "de", "à", "maintenant"], a: 2 },
        { q: "Elle vérifie ses messages ________ neuf heures.", t: "She checks her messages at nine o'clock.", o: ["à", "pendant", "de", "tout de suite"], a: 0 },
        { q: "Nous déjeunons ensemble ________ treize heures.", t: "We have lunch together at one o'clock (13:00).", o: ["de", "pendant", "maintenant", "à"], a: 3 },
        { q: "Vous finissez votre journée ________ dix-sept heures.", t: "You finish your day at five o'clock (17:00).", o: ["à", "pendant", "de", "tout de suite"], a: 0 },
        { q: "Le supermarché ferme ________ vingt heures et demie.", t: "The supermarket closes at half past eight (20:30).", o: ["pendant", "à", "de", "maintenant"], a: 1 },
        
        // 3. Plage horaire
        { q: "J'assiste à la conférence ________ 10 heures à 11 heures et demie.", t: "I attend the conference from 10 AM to 11:30 AM.", o: ["pendant", "à", "de", "maintenant"], a: 2 },
        { q: "Les enfants jouent au football de 16 heures ________ 18 heures.", t: "The children play soccer from 4 PM to 6 PM.", o: ["à", "pendant", "de", "tout de suite"], a: 0 },
        { q: "La bibliothèque est ouverte ________ mardi au samedi.", t: "The library is open from Tuesday to Saturday.", o: ["pendant", "à", "du", "maintenant"], a: 2 },
        { q: "Ma pause déjeuner est de midi ________ treize heures.", t: "My lunch break is from noon to 1 PM.", o: ["pendant", "à", "de", "tout de suite"], a: 1 },
        { q: "Ils roulent ________ Paris à Marseille.", t: "They drive from Paris to Marseille.", o: ["de", "à", "pendant", "maintenant"], a: 0 },
        
        // 4. Exprimer la durée
        { q: "Je cuisine un bon repas ________ quarante-cinq minutes.", t: "I cook a good meal for forty-five minutes.", o: ["à", "de", "maintenant", "pendant"], a: 3 },
{ q: "Elle dort profondément ________ huit heures chaque nuit.", t: "She sleeps soundly for eight hours every night.", o: ["pendant", "à", "de", "tout de suite"], a: 0 },
        { q: "________ la matinée, le magasin de fleurs est très calme.", t: "During the morning, the flower shop is very quiet.", o: ["À", "Pendant", "De", "Maintenant"], a: 1 },
        { q: "Nous discutons de notre projet ________ la pause café.", t: "We discuss our project during the coffee break.", o: ["à", "de", "pendant", "tout de suite"], a: 2 },
        { q: "Ils écoutent les informations à la radio ________ cinq minutes.", t: "They listen to the news on the radio for five minutes.", o: ["à", "pendant", "de", "maintenant"], a: 1 }
    ];

    let currentIdx = 0;
    let score = 0;
    let isTrans = false;

    function loadQ() {
        isTrans = false;
        const q = questions[currentIdx];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('t-link').innerText = "👁️ Traduire en anglais / Translate to English";
        
        document.getElementById('q-count').innerText = "Question " + (currentIdx + 1) + "/20";
        document.getElementById('p-bar').style.width = ((currentIdx + 1) / 20 * 100) + "%";
        
        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => check(i, btn);
            optCont.appendChild(btn);
        });
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function toggleTranslation() {
        isTrans = !isTrans;
        document.getElementById('t-link').innerText = isTrans ? questions[currentIdx].t : "👁️ Traduire en anglais / Translate to English";
    }

    function check(i, btn) {
        const correct = questions[currentIdx].a;
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);

        const f = document.getElementById('feedback');
        f.style.display = 'block';
        
        if(i === correct) {
            btn.classList.add('correct');
            f.innerText = "Excellent ! Correct. ✅";
            f.style.color = "var(--success)";
            score++;
            document.getElementById('score-count').innerText = "Score: " + score;
        } else {
            btn.classList.add('incorrect');
            all[correct].classList.add('correct');
            f.innerText = "Dommage ! La réponse était : " + questions[currentIdx].o[correct] + " ❌";
            f.style.color = "var(--error)";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 20) loadQ();
        else showRes();
    }

    function showRes() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score + " / 20";
        const comm = document.getElementById('res-comment');
        
        if(score === 20) comm.innerHTML = "Parfait ! Vous êtes un expert de la gestion du temps et de la durée.<br><i>Perfect! You are an expert in managing time and duration.</i>";
        else if(score >= 14) comm.innerHTML = "Très bien ! Vous maîtrisez bien l'heure, les plages horaires et la durée.<br><i>Great! You understand time, time slots, and duration well.</i>";
        else comm.innerHTML = "Continuez d'apprendre les expressions de temps (pendant, maintenant, de... à...) !<br><i>Keep learning time expressions!</i>";
    }

    loadQ();
</script>

</body>
</html>
