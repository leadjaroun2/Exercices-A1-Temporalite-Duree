<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Durée & Temporalité A1 - Français</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700&family=Playfair+Display:wght=700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003057; /* Bleu Marine Management */
            --accent: #00A9CE; /* Bleu Azur */
            --success: #27AE60;
            --error: #E74C3C;
            --bg: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #E2E8F0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-card {
            background: white;
            width: 95%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 40px;
        }

        /* Barre de progression */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-container {
            flex-grow: 1;
            height: 8px;
            background: #EDF2F7;
            border-radius: 4px;
            margin: 0 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Zone Question */
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 28px;
            margin: 0 0 20px 0;
        }

        .question-box {
            background: var(--bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 10px;
        }

        .translation-link {
            color: var(--accent);
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            font-style: italic;
        }

        /* Boutons */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid #E2E8F0;
            padding: 18px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #F0F9FF;
        }

        .option-btn.correct {
            background-color: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }

        .option-btn.incorrect {
            background-color: #FEE2E2;
            border-color: var(--error);
            color: #991B1B;
        }

        /* Feedback */
        .feedback {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            display: none;
        }

        .next-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        .next-btn:hover {
            background: #002340;
        }

        /* Ecran Final */
        #result-screen {
            text-align: center;
            display: none;
        }
        
        .score-big {
            font-size: 64px;
            color: var(--primary);
            font-weight: 800;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="quiz-ui">
        <div class="header">
            <span id="q-count" style="font-weight: 600; color: #64748B;">Question 1/20</span>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
            <span id="score-count" style="font-weight: 600; color: var(--primary);">Score: 0</span>
        </div>

        <h1>Durée &amp; Temporalité</h1>
        
        <div class="question-box">
            <div class="question-text" id="q-text">Chargement...</div>
            <div class="translation-link" id="t-link" onclick="toggleTranslation()">👁️ Traduire en anglais / Translate to English</div>
        </div>

        <div class="options-grid" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
    </div>

    <div id="result-screen">
        <h1 id="res-title">Quiz Terminé !</h1>
        <div class="score-big" id="final-score">0 / 20</div>
        <p id="res-comment" style="font-size: 18px; margin-bottom: 30px;"></p>
        <button class="next-btn" style="display:block;" onclick="location.reload()">Recommencer / Restart</button>
    </div>
</div>
